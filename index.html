<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOLA ERP - FULL SYSTEM</title>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --success: #10b981; --danger: #ef4444; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* LOGIN */
        #loginPage { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid var(--primary); width: 320px; text-align: center; }
        .login-card input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: var(--bg); color: white; }
        .login-card button { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* DASHBOARD GRID */
        #dashboard { display: none; height: 100vh; padding: 40px; box-sizing: border-box; }
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .folder-card { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #334155; transition: 0.3s; }
        .folder-card:hover { border-color: var(--primary); transform: translateY(-5px); background: #2d3a4f; }
        .folder-card i { font-size: 40px; display: block; margin-bottom: 15px; }

        /* HEADER & BACK BUTTONS */
        .page-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .back-btn { background: #475569; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .back-btn:hover { background: #64748b; }

        /* MODULES */
        .module-page { display: none; height: 100vh; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        
        /* POS & TABLES */
        .table-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; }
        .table-box { background: var(--card); padding: 20px 0; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid #334155; }
        .table-box.occupied { background: #f59e0b; border-color: #fbbf24; }
        
        .pos-container { display: flex; gap: 20px; height: 75vh; }
        .menu-section { flex: 2; background: var(--card); border-radius: 12px; padding: 15px; overflow-y: auto; }
        .bill-section { flex: 1.5; background: var(--bg); border: 1px solid #334155; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; }
        
        /* DATA TABLES */
        .data-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; margin-top: 10px; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        .data-table th { background: #2d3a4f; font-size: 13px; }

        .btn-action { background: var(--success); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .logout-btn { background: var(--danger); margin-top: 40px; padding: 15px 40px; border: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-card">
        <h1 style="color:var(--primary)">FOLA ERP</h1>
        <input type="text" id="l_user" placeholder="Username">
        <input type="password" id="l_pass" placeholder="Password">
        <button onclick="doLogin()">SECURE LOGIN</button>
    </div>
</div>

<div id="dashboard">
    <div style="text-align:center; margin-bottom: 40px;">
        <h1 style="margin:0">Management Dashboard</h1>
        <p id="welcomeMsg" style="color: var(--primary)"></p>
    </div>
    <div class="dash-grid">
        <div class="folder-card" onclick="openModule('tablePage')"><i>🪑</i>Select Table</div>
        <div class="folder-card admin-only" onclick="openModule('auditPage')"><i>📊</i>Sales & Audit</div>
        <div class="folder-card admin-only" onclick="openModule('stockPage')"><i>📦</i>Stock Control</div>
        <div class="folder-card admin-only" onclick="openModule('expensePage')"><i>💸</i>Expenses</div>
        <div class="folder-card admin-only" onclick="openModule('menuPage')"><i>🍽️</i>Menu Settings</div>
        <div class="folder-card admin-only" onclick="openModule('userPage')"><i>👥</i>User Management</div>
    </div>
    <center><button class="logout-btn" onclick="location.reload()">LOGOUT SYSTEM</button></center>
</div>

<div id="tablePage" class="module-page">
    <div class="page-header">
        <h2>Floor Layout (1-100)</h2>
        <button class="back-btn" onclick="goHome()">← Back to Dashboard</button>
    </div>
    <div id="tableGrid" class="table-grid"></div>
</div>

<div id="posPage" class="module-page">
    <div class="page-header">
        <h2 id="posTitle">Table</h2>
        <button class="back-btn" onclick="openModule('tablePage')">← Change Table</button>
    </div>
    <div class="pos-container">
        <div class="menu-section">
            <div style="margin-bottom:15px;">
                <button class="back-btn" onclick="renderMenu('Food')">FOOD</button>
                <button class="back-btn" onclick="renderMenu('Drinks')">DRINKS</button>
            </div>
            <div id="menuGrid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;"></div>
        </div>
        <div class="bill-section">
            <div id="orderItems" style="flex:1; overflow-y:auto;"></div>
            <div style="border-top:1px solid #334155; padding-top:10px;">
                <h3 id="posTotal" style="text-align:right; color:var(--success)">₦0.00</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn-action" style="background:#0ea5e9" onclick="printDocket()">ORDER</button>
                    <button class="btn-action" style="background:#8b5cf6" onclick="printBill()">BILL</button>
                    <button class="btn-action" style="grid-column: span 2" onclick="payBill()">PAY & PRINT</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="auditPage" class="module-page">
    <div class="page-header">
        <h2>Financial Audit</h2>
        <button class="back-btn" onclick="goHome()">← Back to Dashboard</button>
    </div>
    <input type="date" id="auditDate" onchange="loadAudit()" style="padding:10px; margin-bottom:15px;">
    <table class="data-table">
        <thead><tr><th>Time</th><th>Table</th><th>Staff</th><th>Amount</th></tr></thead>
        <tbody id="auditBody"></tbody>
    </table>
</div>

<div id="stockPage" class="module-page">
    <div class="page-header">
        <h2>Stock Control</h2>
        <button class="back-btn" onclick="goHome()">← Back to Dashboard</button>
    </div>
    <table class="data-table">
        <thead><tr><th>Category</th><th>Item</th><th>Stock</th><th>Action</th></tr></thead>
        <tbody id="stockBody"></tbody>
    </table>
</div>

<div id="expensePage" class="module-page">
    <div class="page-header">
        <h2>Expenses Folder</h2>
        <button class="back-btn" onclick="goHome()">← Back to Dashboard</button>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:10px; margin-bottom:20px;">
        <input type="text" id="exD" placeholder="Description">
        <input type="number" id="exA" placeholder="Amount">
        <button class="back-btn" style="background:var(--primary)" onclick="addExp()">Log</button>
    </div>
    <table class="data-table"><tbody id="exBody"></tbody></table>
</div>

<div id="menuPage" class="module-page">
    <div class="page-header">
        <h2>Menu Settings</h2>
        <button class="back-btn" onclick="goHome()">← Back to Dashboard</button>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:10px;">
        <select id="mC"><option>Food</option><option>Drinks</option></select>
        <input type="text" id="mN" placeholder="Name">
        <input type="number" id="mP" placeholder="Price">
        <button class="back-btn" style="background:var(--primary)" onclick="addMenu()">Add Item</button>
    </div>
</div>

<div id="userPage" class="module-page">
    <div class="page-header">
        <h2>User Management</h2>
        <button class="back-btn" onclick="goHome()">← Back to Dashboard</button>
    </div>
    <div style="background:var(--card); padding:20px; border-radius:10px; margin-bottom:20px;">
        <input type="text" id="uN" placeholder="Name">
        <input type="text" id="uP" placeholder="Pass">
        <select id="uR"><option value="waiter">Waiter</option><option value="admin">Admin</option></select>
        <button class="back-btn" style="background:var(--primary)" onclick="addUser()">Create</button>
    </div>
    <table class="data-table"><tbody id="uBody"></tbody></table>
</div>

<div id="printSection" style="display:none;"></div>

<script>
    let db = {
        users: JSON.parse(localStorage.getItem('f_users')) || [{user:'Admin', pass:'1842', role:'admin'}],
        menu: JSON.parse(localStorage.getItem('f_menu')) || [],
        sales: JSON.parse(localStorage.getItem('f_sales')) || [],
        exp: JSON.parse(localStorage.getItem('f_exp')) || [],
        stock: JSON.parse(localStorage.getItem('f_stock')) || {},
        orders: JSON.parse(localStorage.getItem('f_orders')) || {}
    };

    let user = null; let table = null;

    function save() {
        localStorage.setItem('f_users', JSON.stringify(db.users));
        localStorage.setItem('f_menu', JSON.stringify(db.menu));
        localStorage.setItem('f_sales', JSON.stringify(db.sales));
        localStorage.setItem('f_exp', JSON.stringify(db.exp));
        localStorage.setItem('f_stock', JSON.stringify(db.stock));
        localStorage.setItem('f_orders', JSON.stringify(db.orders));
    }

    function doLogin() {
        const u = document.getElementById('l_user').value;
        const p = document.getElementById('l_pass').value;
        const f = db.users.find(x => x.user === u && x.pass === p);
        if(f) {
            user = f; document.getElementById('loginPage').style.display='none';
            document.getElementById('dashboard').style.display='block';
            document.getElementById('welcomeMsg').innerText = "Logged in as: " + user.user;
            if(user.role !== 'admin') document.querySelectorAll('.admin-only').forEach(e => e.style.display='none');
        } else alert("Denied");
    }

    function openModule(id) {
        document.getElementById('dashboard').style.display='none';
        document.querySelectorAll('.module-page').forEach(m => m.style.display='none');
        document.getElementById(id).style.display='block';
        if(id === 'tablePage') renderTables();
        if(id === 'stockPage') renderStock();
        if(id === 'userPage') renderUsers();
        if(id === 'expensePage') renderExp();
        if(id === 'auditPage') loadAudit();
    }

    function goHome() {
        document.querySelectorAll('.module-page').forEach(m => m.style.display='none');
        document.getElementById('dashboard').style.display='block';
    }

    // TABLES
    function renderTables() {
        const g = document.getElementById('tableGrid'); g.innerHTML = "";
        for(let i=1; i<=100; i++) {
            const t = "Table "+i;
            const d = document.createElement('div');
            d.className = "table-box" + (db.orders[t] ? " occupied" : "");
            d.innerText = i; d.onclick = () => { table = t; openModule('posPage'); document.getElementById('posTitle').innerText = t; renderMenu('Food'); renderOrder(); };
            g.appendChild(d);
        }
    }

    // POS
    function renderMenu(cat) {
        const g = document.getElementById('menuGrid'); g.innerHTML = "";
        db.menu.filter(m => m.cat === cat).forEach(item => {
            const b = document.createElement('button'); b.className = "back-btn";
            b.style.width="100%"; b.style.marginBottom="5px";
            b.innerHTML = `${item.name}<br>₦${item.price}`;
            b.onclick = () => {
                if(!db.orders[table]) db.orders[table] = [];
                let ex = db.orders[table].find(o => o.name === item.name && !o.sent);
                if(ex) ex.qty++; else db.orders[table].push({...item, qty:1, sent:false});
                renderOrder();
            };
            g.appendChild(b);
        });
    }

    function renderOrder() {
        const b = document.getElementById('orderItems'); b.innerHTML = "";
        let t = 0;
        (db.orders[table] || []).forEach(i => {
            t += i.price * i.qty;
            b.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #334155;"><span>${i.name} x${i.qty}</span><span>₦${(i.price*i.qty).toLocaleString()}</span></div>`;
        });
        document.getElementById('posTotal').innerText = "₦" + t.toLocaleString();
        save();
    }

    function payBill() {
        const items = db.orders[table];
        if(!items) return;
        items.forEach(s => { if(db.stock[s.name]) db.stock[s.name] -= s.qty; });
        db.sales.push({time: new Date().toLocaleTimeString(), date: new Date().toISOString().split('T')[0], table: table, staff: user.user, total: items.reduce((a,b) => a + (b.price*b.qty), 0)});
        delete db.orders[table]; save(); alert("Paid"); openModule('tablePage');
    }

    // ADMIN SYNC
    function renderStock() {
        const b = document.getElementById('stockBody'); b.innerHTML = "";
        db.menu.forEach(m => b.innerHTML += `<tr><td>${m.cat}</td><td>${m.name}</td><td>${db.stock[m.name] || 0}</td><td><button onclick="addS('${m.name}')">Add</button></td></tr>`);
    }
    function addS(n) { const a = prompt("Qty?"); if(a) { db.stock[n] = (db.stock[n]||0)+parseInt(a); save(); renderStock(); } }

    function addUser() { db.users.push({user: document.getElementById('uN').value, pass: document.getElementById('uP').value, role: document.getElementById('uR').value}); save(); renderUsers(); }
    function renderUsers() { const b = document.getElementById('uBody'); b.innerHTML = ""; db.users.forEach(u => b.innerHTML += `<tr><td>${u.user}</td><td>${u.role}</td></tr>`); }

    function addMenu() { db.menu.push({cat: document.getElementById('mC').value, name: document.getElementById('mN').value, price: parseInt(document.getElementById('mP').value)}); save(); alert("Added"); }

    function addExp() { db.exp.push({date: new Date().toLocaleDateString(), desc: document.getElementById('exD').value, amt: parseInt(document.getElementById('exA').value)}); save(); renderExp(); }
    function renderExp() { const b = document.getElementById('exBody'); b.innerHTML = ""; db.exp.forEach(e => b.innerHTML += `<tr><td>${e.date}</td><td>${e.desc}</td><td>₦${e.amt.toLocaleString()}</td></tr>`); }

    function loadAudit() {
        const d = document.getElementById('auditDate').value || new Date().toISOString().split('T')[0];
        const b = document.getElementById('auditBody'); b.innerHTML = "";
        db.sales.filter(s => s.date === d).forEach(s => b.innerHTML += `<tr><td>${s.time}</td><td>${s.table}</td><td>${s.staff}</td><td>₦${s.total.toLocaleString()}</td></tr>`);
    }
</script>
</body>
</html>
